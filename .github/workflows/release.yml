name: Release

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  build-binaries:
    name: Build Go binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o spiffe-demo-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: spiffe-demo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: spiffe-demo-${{ matrix.goos }}-${{ matrix.goarch }}

  upload-binaries:
    name: Upload binaries to release
    runs-on: ubuntu-latest
    needs: build-binaries

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: spiffe-demo-*
          merge-multiple: true

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*

  build-containers:
    name: Build container images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    strategy:
      matrix:
        include:
          - image: spiffe-demo
            context: .
          - image: spiffe-demo-init
            context: ./deploy/initcontainer
          - image: spiffe-postgres
            context: ./deploy/postgresql
          - image: spiffe-gcp-proxy
            context: ./deploy/spiffe-gcp-proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        run: |
          echo "REPOSITORY=${REPOSITORY_NN,,}" >>${GITHUB_ENV}
        env:
          REPOSITORY_NN: '${{ github.repository }}'

      - name: Extract version from tag
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >>${GITHUB_ENV}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          context: ${{ matrix.context }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ matrix.image }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ matrix.image }}:latest
