name: Docker Image SPIFFE Demo

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]
env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: make test

  docker:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: set lower case owner name
        run: |
          echo "REPOSITORY=${REPOSITORY_NN,,}" >>${GITHUB_ENV}
        env:
          REPOSITORY_NN: '${{ github.repository }}'

      - name: Sanitize branch name for Docker tag
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # Replace / with - and remove any other invalid characters
            SANITIZED=$(echo "${{ github.head_ref }}" | sed 's/\//-/g' | sed 's/[^a-zA-Z0-9._-]//g')
          else
            SANITIZED="latest"
          fi
          echo "DOCKER_TAG=${SANITIZED}" >>${GITHUB_ENV}

      - name: Build and push spiffe-demo
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          context: .
          tags: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/spiffe-demo:${{ env.DOCKER_TAG }}
